kind = "web"
previewPath = "/"
title = "Smart Irrigation Dashboard"
version = "1.0.0"
id = "artifacts/irrigation-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21757

[services.development]
run = "pnpm --filter @workspace/irrigation-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/irrigation-dashboard", "run", "build" ]
publicDir = "artifacts/irrigation-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21757"
BASE_PATH = "/"
